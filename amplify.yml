version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 18
        - nvm use 18
        - node -v
        - npm ci
        # Fix npm optionalDependencies bug: ensure Rollup Linux binary is present (Amplify runs on Linux)
        - npm install @rollup/rollup-linux-x64-gnu --no-save
    build:
      commands:
        - nvm use 18
        - node -v
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: /index.html
    headers:
      - key: Cache-Control
        value: 'public, max-age=0, must-revalidate'
